<!-- Modal Me Interesa -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">

    <!-- Header -->
    <div class="modal-header">
      <img src="../Componentes_Visuales_Animados/img/ImgInicio/Logo_HOFLOG.png" alt="Logo" class="modal-logo">
      <div>
        <h3 class="modal-titulo">Solicitud de Interés</h3>
        <p class="modal-subtitulo">Completa el formulario y nos pondremos en contacto contigo</p>
      </div>
      <button class="modal-cerrar" id="modalCerrar">&times;</button>
    </div>

    <!-- Info del animal -->
    <div class="modal-animal">
      <img src="" alt="Animal" class="modal-animal-img" id="modalAnimalImg">
      <div class="modal-animal-info">
        <h4 id="modalAnimalNombre">Genética</h4>
        <span class="modal-animal-finca">Número/finca: <strong id="modalAnimalFinca">88</strong></span>
      </div>
    </div>

    <!-- Formulario -->
    <div class="modal-form">
      <div class="modal-campo">
        <label>Nombre completo</label>
        <input type="text" id="modalNombre" placeholder="Tu nombre">
      </div>
      <div class="modal-campo">
        <label>Número de celular</label>
        <input type="tel" id="modalCel" placeholder="+507 0000-0000">
      </div>
      <div class="modal-campo">
        <label>Correo electrónico</label>
        <input type="email" id="modalCorreo" placeholder="correo@ejemplo.com">
      </div>
      <div class="modal-campo">
        <label>Descripción / Mensaje</label>
        <textarea id="modalDesc" rows="3" placeholder="Escribe tu mensaje aquí..."></textarea>
      </div>
    </div>

    <!-- Botones -->
    <div class="modal-botones">
      <button class="modal-btn-cancelar" id="modalCerrar2">Cancelar</button>
      <button class="modal-btn-correo" id="btnCorreo">
        <i class="fa-solid fa-envelope"></i> Enviar por correo
      </button>
      <button class="modal-btn-whatsapp" id="btnWhatsapp">
        <i class="fa-brands fa-whatsapp"></i> Enviar por WhatsApp
      </button>
    </div>

  </div>
</div>
