<section class="esencia" id="trazabilidad" style="background-color:#F6F2EC;">
  <div class="esencia-container">

    <div class="esencia-header">
      <span class="card-label">Trazabilidad Total</span>
      <h2 class="section-title">El Proceso: Ordeño al Garrafón</h2>
      <p class="esencia-intro">
        El control de calidad es el filtro entre el ordeño y la venta. Así funciona.
      </p>
    </div>

    <!-- Grid de pasos -->
    <div style="display:grid; grid-template-columns:1fr auto 1fr auto 1fr; align-items:center; gap:16px;">

      <!-- Paso 1 -->
      <div style="position:relative; border-radius:10px; overflow:hidden; aspect-ratio:3/4; box-shadow:0 8px 24px rgba(0,0,0,0.12);">
        <img src="../Componentes_Visuales_Animados/img/ImgProduccion/ordeño.png" alt="Ordeño diario"
             style="width:100%; height:100%; object-fit:cover; display:block;" />
        <div style="position:absolute; bottom:0; left:0; right:0; padding:14px 12px; background:linear-gradient(transparent,rgba(0,0,0,0.65));">
          <strong style="display:block; font-family:'Inter',sans-serif; font-size:13px; color:#fff; font-weight:700;">Ordeño Diario</strong>
          <span style="font-family:'Inter',sans-serif; font-size:12px; color:#fff;">Las vacas son ordeñadas cada día de forma higiénica y controlada</span>
        </div>
      </div>

      <!-- Flecha -->
      <div style="color:#2d6a4f; font-size:28px; display:flex; align-items:center; justify-content:center;">
        <i class="fa-solid fa-arrow-right"></i>
      </div>

      <!-- Paso 2 -->
      <div style="position:relative; border-radius:10px; overflow:hidden; aspect-ratio:3/4; box-shadow:0 8px 24px rgba(0,0,0,0.12);">
        <img src="../Componentes_Visuales_Animados/img/ImgProduccion/vTratamiento.png" alt="Control de calidad"
             style="width:100%; height:100%; object-fit:cover; display:block;" />
        <div style="position:absolute; bottom:0; left:0; right:0; padding:14px 12px; background:linear-gradient(transparent,rgba(0,0,0,0.65));">
          <strong style="display:block; font-family:'Inter',sans-serif; font-size:13px; color:#fff; font-weight:700;">Control Visual</strong>
          <span style="font-family:'Inter',sans-serif; font-size:12px; color:#fff;">Se identifica cada vaca con tratamiento activo</span>
        </div>
      </div>

      <!-- Flecha -->
      <div style="color:#2d6a4f; font-size:28px; display:flex; align-items:center; justify-content:center;">
        <i class="fa-solid fa-arrow-right"></i>
      </div>

      <!-- Paso 3: doble -->
      <div style="display:flex; flex-direction:column; gap:12px;">

        <div style="position:relative; border-radius:10px; overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,0.12);">
          <img src="../Componentes_Visuales_Animados/img/ImgProduccion/lechelimpia.jpg" alt="Leche limpia"
               style="width:100%; height:160px; object-fit:cover; display:block;" />
          <span style="position:absolute; top:10px; right:10px; background:#2d6a4f; color:#fff; font-family:'Inter',sans-serif; font-size:10px; font-weight:600; padding:4px 9px; border-radius:20px; text-transform:uppercase; display:flex; align-items:center; gap:5px;">
            <i class="fa-solid fa-circle-check"></i> Leche Limpia
          </span>
        </div>

        <div style="position:relative; border-radius:10px; overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,0.12);">
          <img src="../Componentes_Visuales_Animados/img/ImgProduccion/residuos.png" alt="Con residuos"
               style="width:100%; height:160px; object-fit:cover; display:block;" />
          <span style="position:absolute; top:10px; right:10px; background:#c0392b; color:#fff; font-family:'Inter',sans-serif; font-size:10px; font-weight:600; padding:4px 9px; border-radius:20px; text-transform:uppercase; display:flex; align-items:center; gap:5px;">
            <i class="fa-solid fa-circle-xmark"></i> Con Residuos
          </span>
        </div>

      </div>
    </div>
  </div>
</section>
