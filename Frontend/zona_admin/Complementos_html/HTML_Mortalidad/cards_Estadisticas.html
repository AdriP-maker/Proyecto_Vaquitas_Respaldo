<!--Espacios de las cartas de estadísticas-->

<div class="row g-3 mb-4">
  <!-- CARD 1 -->
  <div class="col-12 col-sm-6 col-lg-3">
    <div class="kpi-card-v2">
      <div class="kpi-icon">
        <i class="fa-solid fa-chart-line"></i>
      </div>

      <div class="kpi-content">
        <div class="kpi-label">Tasa de mortalidad</div>
        <div class="kpi-value">3.3%</div>
        <div class="kpi-sub">0.3% más que mes anterior</div>
      </div>
    </div>
  </div>

  <!-- CARD 2 -->
  <div class="col-12 col-sm-6 col-lg-3">
    <div class="kpi-card-v2">
      <div class="kpi-icon">
        <i class="fa-solid fa-lungs"></i>
      </div>

      <div class="kpi-content">
        <div class="kpi-label">Principal causa</div>
        <div class="kpi-value">Respiratoria</div>
        <div class="kpi-sub">42% de casos</div>
      </div>
    </div>
  </div>

  <!-- CARD 3 -->
  <div class="col-12 col-sm-6 col-lg-3">
    <div class="kpi-card-v2 hembra">
      <div class="kpi-icon">
        <i class="fa-solid fa-venus"></i>
      </div>

      <div class="kpi-content">
        <div class="kpi-label">Hembras</div>
        <div id="countHembras" class="kpi-value">0</div>
        <div class="kpi-sub">Total registradas</div>
      </div>
    </div>
  </div>

  <!-- CARD 4 -->
  <div class="col-12 col-sm-6 col-lg-3">
    <div class="kpi-card-v2 macho">
      <div class="kpi-icon">
        <i class="fa-solid fa-mars"></i>
      </div>

      <div class="kpi-content">
        <div class="kpi-label">Machos</div>
        <div id="countMachos" class="kpi-value">0</div>
        <div class="kpi-sub">Total registrados</div>
      </div>
    </div>
  </div>
</div>
